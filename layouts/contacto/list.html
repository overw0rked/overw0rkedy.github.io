{{ define "main" }}
<main class="container container-narrow" id="main">
  {{ partial "topnav.html" . }}

  <section style="padding: clamp(36px,6vw,72px) 0 clamp(24px,4vw,48px); border-bottom: 1px solid var(--ink-300); margin-bottom: 48px;">
    <div style="font-size: 11px; letter-spacing: 1.8px; text-transform: uppercase; color: var(--ink-500); font-family: 'JetBrains Mono', monospace; margin-bottom: 24px;">// Contacto</div>
    <h1 style="font-size: clamp(72px,14vw,200px); line-height: 0.9; font-weight: 500; letter-spacing: -0.045em; margin: 0 0 24px; color: var(--ink-900);">{{ .Title }}<span style="color: var(--accent);">.</span></h1>
    <p style="font-size: clamp(16px, 2vw, 22px); line-height: 1.5; color: var(--ink-500); margin: 0; max-width: 56ch;">{{ .Description }}</p>
  </section>

  {{ partial "contact-form.html" . }}

  {{ partial "footer.html" . }}
</main>
{{ end }}
